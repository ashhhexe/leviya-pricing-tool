    <style>
      :root { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: #0f172a; background: #f1f5f9; }
      * { box-sizing: border-box; }
      body { margin: 0; }
      .app { max-width: 1360px; margin: 0 auto; padding: 1rem; }
      .pricelist { background: #fff; border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 1rem; min-height: 86vh; }
      .controls { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-bottom: 1rem; }
      label { display: grid; gap: 0.35rem; font-weight: 600; }
      input, select { border: 1px solid #cbd5e1; border-radius: 0.5rem; padding: 0.65rem; font-size: 1rem; }
      .category-bar { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
      button { border: none; border-radius: 0.5rem; padding: 0.55rem 0.75rem; background: #2563eb; color: white; cursor: pointer; }
      .category-btn { background: #e2e8f0; color: #0f172a; }
      .category-btn.active { background: #2563eb; color: white; }
      .item-grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
      .item-card { background: white; border-radius: 0.75rem; padding: 1rem; border: 1px solid #e2e8f0; display: grid; gap: 0.45rem; }
      .item-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
      .toggle-btn.selected { background: #dc2626; }
      .dock { position: fixed; top: 50%; right: -52px; transform: translateY(-50%); background: #0f172a; border-radius: 12px 0 0 12px; padding: .5rem .35rem; display: grid; gap: .45rem; z-index: 9999; transition: right .2s ease; }
      body:hover .dock, .dock:hover { right: 0; }
      .dock-btn { width: 40px; height: 40px; display: grid; place-items: center; background: #1e293b; border-radius: 10px; font-size: 1.1rem; }
      .dock-btn.active { background: #2563eb; }
      .widget { position: fixed; background: #fff; border: 1px solid #cbd5e1; border-radius: .75rem; box-shadow: 0 18px 45px rgba(15,23,42,.25); z-index: 2000; resize: both; overflow: auto; min-width: 320px; min-height: 180px; }
      .widget[hidden] { display: none; }
      .widget-header { display: flex; justify-content: space-between; align-items: center; gap: .5rem; padding: .5rem .65rem; border-bottom: 1px solid #e2e8f0; background: #f8fafc; cursor: move; position: sticky; top: 0; }
      .widget-actions { display: flex; gap: .35rem; }
      .widget-body { padding: .7rem; }
      .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .35rem; }
      .calc-display { font-size: 1.1rem; font-weight: 700; border: 1px solid #cbd5e1; border-radius: 0.5rem; padding: 0.6rem; text-align: right; margin-bottom: .5rem; }
      table { width: 100%; border-collapse: collapse; font-size: .9rem; }
      th, td { border: 1px solid #e2e8f0; padding: .38rem; text-align: left; }
      .money { text-align: right; white-space: nowrap; }
      .quotation-summary { display: grid; gap: .35rem; justify-items: end; margin-top: .5rem; }
      .qa-result { border: 1px solid #cbd5e1; border-radius: 0.5rem; padding: 0.6rem; background: #f8fafc; margin-top: .45rem; }
      .small-note { font-size: .85rem; color: #475569; }
      .auto-quote-input { width: 100%; min-height: 130px; border: 1px solid #cbd5e1; border-radius: .5rem; padding: .65rem; font-size: .95rem; font-family: inherit; }
      .auto-quote-actions { display: flex; gap: .45rem; flex-wrap: wrap; margin: .6rem 0; }
      .auto-quote-table td input, .auto-quote-table td select { width: 100%; padding: .4rem; font-size: .85rem; }
    </style>

const parseSupplierPriceList=(text)=>text.split('\n').map((line,idx)=>{const cleaned=line.trim();if(!cleaned)return null;const match=cleaned.match(/^(.+?)\s+-\s+([\d,.]+)\s*$/);if(!match)return null;return {id:10000+idx,name:match[1].trim(),price:Number(match[2].replace(/,/g,'')),fixed:false};}).filter(Boolean);
const supplierItems=parseSupplierPriceList(supplierPriceList);
const manualQA=[{ q:'What is the payment term?', a:'50% payment to proceed with the order and 50% payment upon delivery/shipment.' },{ q:'What is price validity?', a:'5 days.' },{ q:'What is delivery schedule?', a:'2–5 days for on-stock items and 5–6 weeks for indent orders.' },{ q:'Are returns allowed?', a:'No return or replacement unless the item has factory defect.' }];
const inferCategories=(name)=>{const n=name.toLowerCase(),set=new Set();if(n.includes('meter'))set.add('Meters');if(n.includes('hdpe'))set.add('HDPE');if(n.includes('ppr'))set.add('PPR');if(n.includes('upvc')||n.includes('pvc'))set.add('PVC/uPVC');if(n.includes('valve'))set.add('Valves');if(n.includes('flange'))set.add('Flanges');if(n.includes('fire')||n.includes('hydrant')||n.includes('siamese')||n.includes('mech groove'))set.add('Fire Protection');if(n.includes('bi ')||n.includes('gi '))set.add('BI/GI');if(!set.size)set.add('Accessories');return [...set];};
const brandFromName=(name)=>['Ecotech','Aquajet','STC','Leviya','Woltman','Superior'].find(b=>name.toLowerCase().includes(b.toLowerCase()))||'';
const parseItem=(i)=>{const size=(i.name.match(/\b\d+(?:-\d+\/\d+|\/\d+|\.\d+)?\s*(?:mm|in)\b/i)||[''])[0];const material=(i.name.match(/(cast iron|brass|bi|gi|hdpe|ppr|upvc|pvc)/i)||[''])[0].toLowerCase();const type=(i.name.match(/(sdr\d+|sch\d+|class\s?\d+|threaded|flanged|welded|vertical|horizontal)/i)||[''])[0].toLowerCase();return {...i,size,material,type,brand:brandFromName(i.name),categories:i.categories?.length?i.categories:inferCategories(i.name)};};
const parsedItems=[...items,...supplierItems].map(parseItem);
const dedupeItems=(arr)=>{const map=new Map();for(const item of arr){const key=[item.name.toLowerCase(),item.size,item.brand.toLowerCase(),item.material,item.type].join('|');const prev=map.get(key);if(!prev||item.price>prev.price)map.set(key,item);}return [...map.values()];};
const normalizeItems=dedupeItems(parsedItems);
const categories=['All',...new Set(normalizeItems.flatMap(i=>i.categories))];
const toCurrency=(v)=>v==null||!Number.isFinite(v)?'N/A':new Intl.NumberFormat('en-PH',{style:'currency',currency:'PHP'}).format(v);
const markedPrice=(item,m)=>item.price==null?null:(item.fixed?item.price:item.price*(1+m/100));
const mmEquivalent=(name)=>{const m=name.match(/(\d+(?:\.\d+)?)\s*in/i);if(!m)return '';return `${(Number(m[1])*25.4).toFixed(1)} mm`;};
const state={activeCategory:'All',copiedId:null,quote:new Map(),discountPercent:0,calcDisplay:'0',z:2200,autoQuoteRows:[]};
const el={search:document.getElementById('search'),markup:document.getElementById('markup'),grid:document.getElementById('item-grid'),categories:document.getElementById('category-bar'),dock:document.getElementById('dock'),widgets:document.getElementById('widgets')};

const inchEquivalent=(name)=>{const m=name.match(/(\d+(?:\.\d+)?)\s*mm\b/i);if(!m)return '';return `${(Number(m[1])/25.4).toFixed(2)} in`;};
const searchIndex=(item)=>[item.name,item.size,item.brand,item.material,item.type,...item.categories,item.keywords,item.notes,mmEquivalent(item.name),inchEquivalent(item.name)].filter(Boolean).join(' ').toLowerCase();

function renderItems(){const rawQuery=el.search.value.toLowerCase();const tokens=[...new Set(rawQuery.split(/\s+/).map(t=>t.trim()).filter(Boolean))];const m=Number(el.markup.value)||0;const matched=normalizeItems.filter(item=>{if(state.activeCategory!=='All'&&!item.categories.includes(state.activeCategory))return false;if(!tokens.length)return true;const haystack=searchIndex(item);return tokens.some(token=>haystack.includes(token));});const seen=new Set();const shown=matched.filter(item=>{if(seen.has(item.id))return false;seen.add(item.id);return true;});el.grid.innerHTML='';shown.forEach(item=>{const selected=state.quote.has(item.id);const card=document.createElement('article');card.className='item-card';card.innerHTML=`<h2 style="font-size:1rem;margin:0">${item.name}</h2><div style="display:flex;gap:.35rem;flex-wrap:wrap">${item.categories.map(c=>`<span class='small-note' style='background:#e2e8f0;padding:.12rem .45rem;border-radius:999px'>${c}</span>`).join('')}${item.brand?`<span class='small-note' style='background:#dcfce7;padding:.12rem .45rem;border-radius:999px'>Brand: ${item.brand}</span>`:''}${item.fixed?`<span class='small-note' style='background:#fee2e2;padding:.12rem .45rem;border-radius:999px'>SP Locked</span>`:''}${item.availability?`<span class='small-note' style='background:#fef3c7;padding:.12rem .45rem;border-radius:999px'>${item.availability}</span>`:''}</div><p class='small-note'>Size: ${item.size||'N/A'} ${mmEquivalent(item.name)?`• ${mmEquivalent(item.name)}`:''}</p><p>Base: ${toCurrency(item.price)}</p><p>Unit Cost: <strong>${toCurrency(markedPrice(item,m))}</strong></p><div class='item-actions'><button data-copy>${state.copiedId===item.id?'Copied!':'Copy'}</button><button class="toggle-btn ${selected?'selected':''}" data-quote ${item.price==null?'disabled title=\'No price available\'':''}>${selected?'Remove':'Add to Quote'}</button></div>`;card.querySelector('[data-copy]').onclick=async()=>{try{await navigator.clipboard.writeText(`${item.name}	${toCurrency(markedPrice(item,m))}`);}catch{}state.copiedId=item.id;renderItems();setTimeout(()=>{state.copiedId=null;renderItems();},900);};card.querySelector('[data-quote]').onclick=()=>toggleQuote(item);el.grid.appendChild(card);});}
function renderDock(){el.dock.innerHTML='';dockItems.forEach(d=>{const b=document.createElement('button');b.className='dock-btn';b.title=d.label;b.textContent=d.icon;b.onclick=()=>openWidget(d.id);el.dock.appendChild(b);});}
function widgetShell(key){const w=widgets[key],id=`widget-${key}`;if(document.getElementById(id))return document.getElementById(id);const n=document.createElement('article');n.id=id;n.className='widget';n.hidden=true;n.innerHTML=`<div class="widget-header"><strong>${w.title}</strong><div class="widget-actions"><button data-reset>Reset</button><button data-max>Maximize</button><button data-close>✕</button></div></div><div class="widget-body"></div>`;el.widgets.appendChild(n);wireWidget(n,key);applyDefaultSize(n,key);return n;}
function applyDefaultSize(node,key){const d=widgets[key].default;node.style.width=d.w+'px';node.style.height=d.h+'px';node.style.left=d.x+'px';node.style.top=d.y+'px';node.dataset.max='0';}
function openWidget(key){const n=widgetShell(key);n.hidden=false;if(key==='quotation')renderQuotation();if(key==='calculator')renderCalculator();if(key==='conversion')renderConversion();if(key==='qa')renderQA();if(key==='autoQuote')renderAutoQuote();}
function wireWidget(node,key){const header=node.querySelector('.widget-header');let sx=0,sy=0,ox=0,oy=0,drag=false;header.onmousedown=(e)=>{if(e.target.closest('button'))return;drag=true;sx=e.clientX;sy=e.clientY;ox=node.offsetLeft;oy=node.offsetTop;};window.addEventListener('mousemove',e=>{if(!drag)return;node.style.left=(ox+e.clientX-sx)+'px';node.style.top=(oy+e.clientY-sy)+'px';});window.addEventListener('mouseup',()=>drag=false);node.querySelector('[data-close]').onclick=()=>node.hidden=true;node.querySelector('[data-reset]').onclick=()=>applyDefaultSize(node,key);node.querySelector('[data-max]').onclick=()=>{if(node.dataset.max==='1'){const p=JSON.parse(node.dataset.prev);Object.assign(node.style,p);node.dataset.max='0';}else{node.dataset.prev=JSON.stringify({left:node.style.left,top:node.style.top,width:node.style.width,height:node.style.height});node.style.left='16px';node.style.top='16px';node.style.width=(window.innerWidth-32)+'px';node.style.height=(window.innerHeight-32)+'px';node.dataset.max='1';}};}
function renderCalculator(){const n=document.querySelector('#widget-calculator .widget-body');const buttons=['7','8','9','/','4','5','6','*','1','2','3','-','0','.','=','+'];n.innerHTML=`<div class='calc-display'>${state.calcDisplay}</div><div class='calc-grid'>${buttons.map(b=>`<button data-calc='${b}'>${b}</button>`).join('')}<button data-calc='C'>C</button></div>`;n.querySelectorAll('[data-calc]').forEach(b=>b.onclick=()=>{const v=b.dataset.calc;if(v==='C')state.calcDisplay='0';else if(v==='='){try{state.calcDisplay=String(Function(`return (${state.calcDisplay})`)());}catch{state.calcDisplay='Error';}}else state.calcDisplay=(state.calcDisplay==='0'||state.calcDisplay==='Error')?v:state.calcDisplay+v;renderCalculator();});}
function renderQuotation(){const n=document.querySelector('#widget-quotation .widget-body');const m=Number(el.markup.value)||0;const rows=[...state.quote.values()].map((r,idx)=>{const item=normalizeItems.find(x=>x.id===r.itemId);const unitCost=markedPrice(item,m),amount=unitCost==null?null:r.qty*unitCost;return {idx:idx+1,...r,item,unitCost,amount};});const subtotal=rows.reduce((s,r)=>s+(r.amount||0),0),discountAmount=subtotal*(state.discountPercent/100),grand=subtotal-discountAmount;n.innerHTML=`<div style='display:flex;gap:.4rem;margin-bottom:.5rem'><button data-copy-quote>Copy quotation table</button><button data-clear style='background:#475569'>Clear quotation</button></div><table><thead><tr><th>ITEM</th><th>QTY</th><th>UNIT</th><th>DESCRIPTION</th><th>UNIT COST</th><th>AMOUNT</th><th></th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.idx}</td><td><input type='number' min='0' step='1' value='${r.qty}' data-qty='${r.itemId}'/></td><td><input value='${r.unit}' data-unit='${r.itemId}'/></td><td>${r.item.name}</td><td class='money'>${toCurrency(r.unitCost)}</td><td class='money'>${toCurrency(r.amount)}</td><td><button data-remove='${r.itemId}'>Remove</button></td></tr>`).join('')}</tbody></table><div class='quotation-summary'><div>SUBTOTAL: <strong>${toCurrency(subtotal)}</strong></div><label>Discount (%) <input id='discount' type='number' step='0.01' min='0' max='100' value='${state.discountPercent}'/></label><div>Discount Amount: <strong>${toCurrency(discountAmount)}</strong></div><div>GRAND TOTAL: <strong>${toCurrency(grand)}</strong></div></div>`;
n.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{state.quote.delete(Number(b.dataset.remove));renderQuotation();renderItems();});n.querySelectorAll('[data-qty]').forEach(i=>i.oninput=()=>{const id=Number(i.dataset.qty),r=state.quote.get(id);r.qty=Math.max(0,Number(i.value)||0);state.quote.set(id,r);renderQuotation();});n.querySelectorAll('[data-unit]').forEach(i=>i.oninput=()=>{const id=Number(i.dataset.unit),r=state.quote.get(id);r.unit=i.value||'pc';state.quote.set(id,r);});n.querySelector('#discount').oninput=(e)=>{state.discountPercent=Math.max(0,Number(e.target.value)||0);renderQuotation();};n.querySelector('[data-clear]').onclick=()=>{state.quote.clear();renderQuotation();renderItems();};n.querySelector('[data-copy-quote]').onclick=async()=>{const lines=['ITEM	QTY	UNIT	DESCRIPTION	UNIT COST	AMOUNT'];rows.forEach(r=>lines.push(`${r.idx}	${r.qty}	${r.unit}	${r.item.name}	${r.unitCost==null?'':r.unitCost.toFixed(2)}	${r.amount==null?'':r.amount.toFixed(2)}`));lines.push(`				SUBTOTAL	${subtotal.toFixed(2)}`);lines.push(`				DISCOUNT (${state.discountPercent}%)	${discountAmount.toFixed(2)}`);lines.push(`				GRAND TOTAL	${grand.toFixed(2)}`);await navigator.clipboard.writeText(lines.join('\n'));};}
function renderConversion(){const n=document.querySelector('#widget-conversion .widget-body');n.innerHTML=`<label>Value <input id='conv-val' type='number' step='any' value='1'></label><label>Convert <select id='conv-type'><option value='mm_in'>mm to inches</option><option value='in_mm'>inches to mm</option><option value='cm_in'>cm to inches</option><option value='in_cm'>inches to cm</option><option value='m_ft'>meters to feet</option><option value='ft_m'>feet to meters</option></select></label><button id='conv-run'>Compute</button><div class='qa-result' id='conv-out'>Result: -</div><div class='small-note'>Approximate nominal pipe size only, verify specs.</div><table><tbody><tr><td>25mm</td><td>≈ 1 in</td></tr><tr><td>40mm</td><td>≈ 1-1/2 in</td></tr><tr><td>50mm</td><td>≈ 2 in</td></tr><tr><td>65mm</td><td>≈ 2-1/2 in</td></tr><tr><td>80mm</td><td>≈ 3 in</td></tr><tr><td>100mm</td><td>≈ 4 in</td></tr><tr><td>150mm</td><td>≈ 6 in</td></tr><tr><td>200mm</td><td>≈ 8 in</td></tr><tr><td>250mm</td><td>≈ 10 in</td></tr><tr><td>300mm</td><td>≈ 12 in</td></tr></tbody></table>`;n.querySelector('#conv-run').onclick=()=>{const v=Number(n.querySelector('#conv-val').value)||0,t=n.querySelector('#conv-type').value;const map={mm_in:v/25.4,in_mm:v*25.4,cm_in:v/2.54,in_cm:v*2.54,m_ft:v*3.28084,ft_m:v/3.28084};n.querySelector('#conv-out').textContent=`Result: ${map[t].toFixed(4)}`;};}
function renderQA(){const n=document.querySelector('#widget-qa .widget-body');n.innerHTML=`<label>Manual FAQ search <input id='qa-input' placeholder='Type your question'/></label><button data-ask>Search Answer</button><div id='qa-result' class='qa-result'></div>`;const result=n.querySelector('#qa-result');n.querySelector('[data-ask]').onclick=()=>{const q=n.querySelector('#qa-input').value.trim().toLowerCase();const hit=manualQA.find(x=>q&&(x.q.toLowerCase().includes(q)||q.includes(x.q.toLowerCase().replace(/[?]/g,''))));if(hit)result.innerHTML=`<strong>Answer:</strong> ${hit.a}<br><em>Source: Manual Info</em>`;else result.innerHTML=`<strong>Answer:</strong> No direct manual match found. Verify before sending to client.<br><em>Source: Not verified / Needs checking</em>`;};}
function normalizeQuery(text){return text.toLowerCase().replace(/[\"']/g,' ').replace(/[^a-z0-9\/\.\s-]/g,' ').replace(/\s+/g,' ').trim();}
const inchToMmMap={0.5:'15',0.75:'20',1:'25',1.25:'32',1.5:'40',2:'50',2.5:'65',3:'80',4:'100',5:'125',6:'150',8:'200',10:'250',12:'300'};
function parseClientLine(line){const raw=line.trim();if(!raw)return null;const m=raw.match(/^(\d+(?:\.\d+)?)\s+(.+)$/);return {qty:m?Number(m[1]):1,text:m?m[2].trim():raw,original:raw};}
function extractSizeTokens(text){const out=[];const n=normalizeQuery(text);const inchRe=/(\d+(?:\/\d+)?(?:\.\d+)?)\s*(?:inches|inch|in|\")\b/g;let hit;while((hit=inchRe.exec(n))){let v=hit[1];if(v.includes('/')){const [a,b]=v.split('/');v=String(Number(a)/Number(b));}const num=Number(v);if(Number.isFinite(num)){const mm=(num*25.4).toFixed(0);out.push(mm+'mm');if(inchToMmMap[num])out.push(inchToMmMap[num]+'mm');}}const mmRe=/(\d+(?:\.\d+)?)\s*mm\b/g;while((hit=mmRe.exec(n))){out.push(Number(hit[1]).toFixed(0)+'mm');}return out;}
function matchProducts(query){const sizeTokens=extractSizeTokens(query);const terms=[...new Set(normalizeQuery(query).split(' ').filter(t=>t&&t.length>1))];return normalizeItems.map(item=>{const hay=searchIndex(item);let score=0;terms.forEach(t=>{if(hay.includes(t))score+=3;});if(hay.includes(normalizeQuery(query)))score+=8;sizeTokens.forEach(t=>{if(hay.includes(t.replace('mm',' mm'))||hay.includes(t))score+=4;});if(/tee\s*reducer/.test(normalizeQuery(query))&&/tee/.test(hay)&&/reducer/.test(hay))score+=6;if(/pressure\s*gauge/.test(normalizeQuery(query))&&/pressure/.test(hay))score+=6;if(/brass\s*check/.test(normalizeQuery(query))&&/brass/.test(hay)&&/check/.test(hay))score+=7;return {item,score};}).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,5);}
function computeRowFromMatch(base,best,choices){const m=Number(el.markup.value)||0;if(!best){return {...base,matches:choices,selectedId:'',unitPrice:null,amount:null,description:base.text,remarks:'No price found / Need supplier price'};}const unitPrice=markedPrice(best,m);const top=choices[0]?.score||0;const confident=top>=12||((choices[1]?.score||0)<=top*0.65);return {...base,matches:choices,selectedId:best.id,unitPrice,amount:unitPrice==null?null:base.qty*unitPrice,description:best.name,remarks:unitPrice==null?'No price found / Need supplier price':(confident?'Matched':'Possible match')};}
function renderAutoQuote(){const n=document.querySelector('#widget-autoQuote .widget-body');n.innerHTML=`<label>Paste client request<textarea id='aq-input' class='auto-quote-input' placeholder='2 2" Pressure Gauge\n1 3/4" brass Check Valve'></textarea></label><div class='auto-quote-actions'><button data-parse>Parse request</button><button data-copy>Copy quotation rows</button><button data-send>Send all matched items to Quotation</button></div><table class='auto-quote-table'><thead><tr><th>QTY</th><th>UNIT</th><th>ITEM DESCRIPTION</th><th>UNIT PRICE</th><th>AMOUNT</th><th>REMARKS</th><th>MATCHES</th></tr></thead><tbody id='aq-body'></tbody></table>`;const tbody=n.querySelector('#aq-body');const renderRows=()=>{tbody.innerHTML=state.autoQuoteRows.map((r,i)=>`<tr><td><input type='number' min='0' step='1' data-aq-qty='${i}' value='${r.qty}'></td><td><input data-aq-unit='${i}' value='${r.unit}'></td><td title='${r.original.replace(/'/g,"&#39;")}'><input data-aq-desc='${i}' value='${r.description}'></td><td class='money'>${r.unitPrice==null?'':toCurrency(r.unitPrice)}</td><td class='money'>${r.amount==null?'':toCurrency(r.amount)}</td><td>${r.remarks}</td><td><select data-aq-match='${i}'><option value=''>No match</option>${r.matches.map(m=>`<option value='${m.item.id}' ${m.item.id===r.selectedId?'selected':''}>${m.item.name}</option>`).join('')}</select></td></tr>`).join('');tbody.querySelectorAll('[data-aq-qty]').forEach(inp=>inp.oninput=()=>{const i=Number(inp.dataset.aqQty),v=Math.max(0,Number(inp.value)||0);state.autoQuoteRows[i].qty=v;state.autoQuoteRows[i].amount=state.autoQuoteRows[i].unitPrice==null?null:v*state.autoQuoteRows[i].unitPrice;renderRows();});tbody.querySelectorAll('[data-aq-unit]').forEach(inp=>inp.oninput=()=>{state.autoQuoteRows[Number(inp.dataset.aqUnit)].unit=inp.value||'pc';});tbody.querySelectorAll('[data-aq-desc]').forEach(inp=>inp.oninput=()=>{state.autoQuoteRows[Number(inp.dataset.aqDesc)].description=inp.value;});tbody.querySelectorAll('[data-aq-match]').forEach(sel=>sel.onchange=()=>{const i=Number(sel.dataset.aqMatch),id=Number(sel.value);const row=state.autoQuoteRows[i];const picked=row.matches.find(m=>m.item.id===id);const rebuilt=computeRowFromMatch({qty:row.qty,unit:row.unit,text:row.text,original:row.original},picked?.item,row.matches);state.autoQuoteRows[i]={...rebuilt,description:picked?picked.item.name:row.description};renderRows();});};n.querySelector('[data-parse]').onclick=()=>{const lines=n.querySelector('#aq-input').value.split('\n').map(parseClientLine).filter(Boolean);state.autoQuoteRows=lines.map(base=>{const matches=matchProducts(base.text);return computeRowFromMatch({...base,unit:'pc'},matches[0]?.item,matches);});renderRows();};n.querySelector('[data-copy]').onclick=async()=>{const lines=['QTY\tUNIT\tITEM DESCRIPTION\tUNIT PRICE\tAMOUNT\tREMARKS'];state.autoQuoteRows.forEach(r=>lines.push(`${r.qty}\t${r.unit}\t${r.description}\t${r.unitPrice==null?'':r.unitPrice.toFixed(2)}\t${r.amount==null?'':r.amount.toFixed(2)}\t${r.remarks}`));await navigator.clipboard.writeText(lines.join('\n'));};n.querySelector('[data-send]').onclick=()=>{state.autoQuoteRows.forEach(r=>{if(!r.selectedId||r.unitPrice==null)return;const ex=state.quote.get(r.selectedId);if(ex){ex.qty+=(Number(r.qty)||0);ex.unit=r.unit||ex.unit||'pc';state.quote.set(r.selectedId,ex);}else state.quote.set(r.selectedId,{itemId:r.selectedId,qty:Number(r.qty)||1,unit:r.unit||'pc'});});openWidget('quotation');renderQuotation();renderItems();};renderRows();}

el.search.addEventListener('input',renderItems);el.markup.addEventListener('input',()=>{renderItems();if(document.querySelector('#widget-quotation:not([hidden])'))renderQuotation();});renderDock();renderCategories();renderItems();
</script>
